<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Rotas Escolar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="map-container"></div>

    <div id="sidebar" class="sidebar">
        <h1>Meu App de Rotas</h1>
        <div class="input-group">
            <label for="origin-input">Origem:</label>
            <input type="text" id="origin-input" placeholder="Digite o endereço de origem...">
        </div>
        <div class="input-group">
            <label for="destination-input">Destino:</label>
            <input type="text" id="destination-input" placeholder="Digite o endereço de destino...">
        </div>
        <div id="waypoints-container">
            <!-- Paradas adicionais serão inseridas aqui -->
        </div>
        <button id="add-waypoint" class="btn">Adicionar Parada</button>
        <button id="calculate-route" class="btn">Calcular Rota</button>

        <div id="route-details">
            <h2>Detalhes da Rota</h2>
            <p><strong>Distância:</strong> <span id="total-distance">--</span></p>
            <p><strong>Tempo Estimado:</strong> <span id="total-time">--</span></p>
            <div id="route-instructions">
                <!-- Instruções da rota serão inseridas aqui -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>

</html>
